# fly.toml app configuration file generated for food-finder-server on 2026-02-27T22:52:34-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'food-finder-server'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'python manage.py migrate'

[env]
  PYTHONDONTWRITEBYTECODE = '1'
  PYTHONUNBUFFERED = '1'

[[services]]
  protocol = ''
  internal_port = 8080
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[checks]
  [checks.http_endpoint]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '5s'
    method = 'get'
    path = '/health/'
    tls_skip_verify = false

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  processes = ['app']
