# fly.toml app configuration file
app = "my-django-app"  # Change this to your app name
primary_region = "dfw"  # Dallas - change to your preferred region

# Build configuration
[build]
dockerfile = "Dockerfile"

# Environment variables
[env]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

# Deployment checks
[deploy]
release_command = "python manage.py migrate"  # Run migrations on deploy

# Services configuration
[[services]]
internal_port = 8080
processes = ["app"]

# HTTP protocol
[[services.ports]]
port = 80
handlers = ["http"]

# HTTPS protocol  
[[services.ports]]
port = 443
handlers = ["tls", "http"]

# Health check
[checks.http_endpoint]
grace_period = "5s"
interval = "30s"
method = "get"
path = "/health/"
protocol = "http"
timeout = "10s"
tls_skip_verify = false

# Scaling configuration
[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
processes = ["app"]
